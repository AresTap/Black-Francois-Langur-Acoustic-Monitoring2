<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 白头叶猴保护平台</title>
    <link rel="stylesheet" href="wangye.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <!-- ======= 新增光影层 ======= -->
    <div class="light-effects">
        <div class="glow-circle blue" style="top:20%; left:10%"></div>
        <div class="glow-circle purple" style="top:70%; right:15%"></div>
    </div>
    <!-- 新增视频背景 -->

    <div class="container">
        <div class="card-logo">
            <img src="img/monkeylogo.png" alt="白头叶猴保护平台">
        </div>
        <div class="glassmorphism-card">
            <!-- 注册表单 -->
            <div class="form-box register">
                <form action="#" onsubmit="event.preventDefault(); register();return false;">
                    <h1 class="hologram-title" style="font-size: 40px;">🌱 成为守护者</h1>
                    <div class="input-box">
                        <input type="text" placeholder="Username" class="neon-input" required id="username">
                        <i class='bx bxs-user'></i>
                    </div>
                    <div class="input-box">
                        <i class='bx bxs-lock-alt'></i>
                        <input type="password" placeholder="Password" class="neon-input" required id="password">
                        <div class="input-glow"></div>
                    </div>
                    <button type="submit" class="btn register-submit-btn">注册</button>
                    <button type="button" class="btn register-btn"
                        onclick="window.location.href='index.html'">返回登录界面</button>
                </form>
            </div>
            <div class="toggle-panel toggle-left">
                <img src="img/monkey1.png" alt="monkey" class="monkey1-img">
                <!-- 注册按钮，跳转到注册页面 -->
                <div class="neon-footer">
                </div>
            </div>
        </div>
    </div>


</body>
<script src="./index1.js"></script>

</html>
